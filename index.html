<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DracX | Sanskrit Professional</title>
    <style>
        :root {
            --light-blue: #00d4ff;
            --deep-black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        /* FULL SCREEN LOCK */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; color: var(--text-main); }

        /* AUTH */
        #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .auth-card { width: 90%; max-width: 340px; padding: 30px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; text-align: center; }
        .m-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 10px; outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn { background: var(--light-blue); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; font-size: 13px; margin-bottom: 8px; }

        /* HEADER */
        header { height: 60px; padding: 0 20px; background: rgba(10,10,10,0.8); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .user-chip { display: flex; align-items: center; gap: 10px; cursor: pointer; background: var(--glass); padding: 5px 12px; border-radius: 50px; border: 1px solid var(--glass-border); }
        .avatar { width: 24px; height: 24px; background: var(--light-blue); border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; }

        /* CONTENT */
        #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 60px); padding: 20px; }
        .main-logo { font-size: 60px; font-weight: 900; letter-spacing: 10px; margin-bottom: 30px; background: linear-gradient(to bottom, #fff, var(--light-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 360px; }

        #editor-screen { display: none; flex-direction: column; height: calc(100vh - 60px); width: 100vw; }
        .ide-body { flex: 1; display: flex; overflow: hidden; background: #080808; }
        #gutter { width: 45px; background: #050505; color: #333; text-align: right; padding: 20px 10px; font-size: 12px; }
        textarea { flex: 1; max-width: calc(100vw - 45px); background: transparent; color: #eee; border: none; outline: none; padding: 20px; font-size: 14px; line-height: 1.6; resize: none; overflow-y: auto; }

        /* MASTER PANEL */
        #master-panel { display: none; position: fixed; top: 10px; right: 10px; bottom: 10px; width: calc(100% - 20px); max-width: 340px; background: rgba(10, 10, 10, 0.98); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; z-index: 3000; overflow-y: auto; }
        .status-dot { width: 8px; height: 8px; background: #ff4b4b; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-online { background: #4bff4b; box-shadow: 0 0 10px #4bff4b; }

        #owner-page { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .about-link { position: fixed; bottom: 20px; right: 20px; color: var(--text-dim); cursor: pointer; font-size: 10px; font-weight: 800; z-index: 50; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="letter-spacing: 4px; margin-bottom: 20px;">DRACX</h1>
            <input type="text" id="user-in" class="m-input" placeholder="Username">
            <input type="password" id="pass-in" class="m-input" placeholder="Password">
            <button class="btn" onclick="executeAuth()">CONTINUE</button>
            <button class="btn" style="background:#0055ff; color:white; font-size:11px;" onclick="promptSpecial()">GMC SPECIAL ACCESS</button>
        </div>
    </div>

    <header>
        <div id="brand-nav" style="font-weight: 900; color: var(--light-blue);">DRACX</div>
        <div class="user-chip" onclick="logout()">
            <span id="user-display" style="font-size: 10px; font-weight: 700;">GUEST</span>
            <div class="avatar" id="user-avatar">?</div>
        </div>
    </header>

    <div id="home-screen">
        <div class="main-logo" id="brand-main">DRACX</div>
        <div class="lang-grid">
            <button class="btn" style="background:var(--glass); color:#fff;" onclick="openIDE('JS')">JS</button>
            <button class="btn" style="background:var(--glass); color:#fff;" onclick="openIDE('PY')">PY</button>
            <button class="btn" style="background:var(--glass); color:#fff;" onclick="openIDE('CPP')">C++</button>
            <button class="btn" style="background:var(--glass); color:#fff;" onclick="openIDE('RUST')">RS</button>
        </div>
    </div>

    <div id="editor-screen">
        <div class="ide-body">
            <div id="gutter">1</div>
            <textarea id="editor" spellcheck="false" oninput="handleInput()"></textarea>
        </div>
    </div>

    <div id="master-panel">
        <div style="margin-bottom: 20px; font-size: 10px; color: var(--text-dim);">
            <span id="p-status-dot" class="status-dot"></span> CONNECTION: <span id="p-status-text">OFFLINE</span>
        </div>
        <h3 style="color:var(--light-blue); margin-bottom: 15px; font-size: 14px;">MASTER CONSOLE</h3>
        
        <label style="font-size: 9px; color: #555;">SITE BRANDING</label>
        <input type="text" id="rename-site" class="m-input" placeholder="New Name">
        <button class="btn" onclick="saveConfig()">Apply Name</button>
        
        <div style="margin: 15px 0; height: 1px; background: #222;"></div>
        
        <p style="font-size: 9px; color: #555; margin-bottom: 5px;">SECURE DEPLOYMENT</p>
        <button class="btn" style="background:#fff; color:#000;" onclick="copySecureHTTPS()">Copy HTTPS Direct Link</button>
        <button class="btn" style="background:rgba(0, 212, 255, 0.1); color:var(--light-blue); border:1px solid var(--light-blue);" onclick="forceHTTPS()">Force HTTPS Protocol</button>
        
        <button onclick="document.getElementById('master-panel').style.display='none'" style="margin-top: 15px; background:none; border:none; color:#444; width:100%; cursor:pointer; font-size: 10px;">EXIT</button>
    </div>

    <div id="owner-page">
        <h1 style="color:var(--light-blue); font-size: 30px;">Sanskrit</h1>
        <p style="font-size: 9px; color: var(--text-dim); margin-bottom: 20px;">OWNER & DEVELOPER</p>
        <input type="password" id="master-key" class="m-input" style="max-width:200px; text-align: center;" placeholder="Master Key" oninput="checkMaster(this.value)">
        <button onclick="toggleOwner(false)" style="margin-top: 20px; background:none; border:none; color:#444; cursor:pointer;">CLOSE</button>
    </div>

    <div class="about-link" onclick="toggleOwner(true)">ABOUT</div>

    <script>
        let loggedUser = null;
        let currentLang = '';

        function promptSpecial() {
            if(prompt("Enter Access Code:") === "GMC") {
                loggedUser = "Special_User";
                localStorage.setItem('dx_sess', "Special_User");
                initApp();
            }
        }

        function executeAuth() {
            const u = document.getElementById('user-in').value.trim();
            const p = document.getElementById('pass-in').value.trim();
            if(!u || !p) return;
            loggedUser = u;
            localStorage.setItem('dx_sess', u);
            initApp();
        }

        function initApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('user-display').innerText = loggedUser.toUpperCase();
            document.getElementById('user-avatar').innerText = loggedUser[0].toUpperCase();
            
            // Check for HTTPS
            if(window.location.protocol === "https:") {
                document.getElementById('p-status-dot').classList.add('status-online');
                document.getElementById('p-status-text').innerText = "SECURE (HTTPS)";
            }
        }

        function logout() { localStorage.removeItem('dx_sess'); location.reload(); }

        function openIDE(l) {
            currentLang = l;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            document.getElementById('editor').value = localStorage.getItem(`dx_${loggedUser}_${l}`) || "";
            handleInput();
        }

        function handleInput() {
            const lines = document.getElementById('editor').value.split('\n');
            document.getElementById('gutter').innerHTML = lines.map((_, i) => i + 1).join('<br>');
            localStorage.setItem(`dx_${loggedUser}_${currentLang}`, document.getElementById('editor').value);
        }

        function toggleOwner(s) { document.getElementById('owner-page').style.display = s ? 'flex' : 'none'; }
        function checkMaster(v) { if(v === "DBDSCREEM") { document.getElementById('master-panel').style.display = 'block'; } }
        
        function saveConfig() {
            const n = document.getElementById('rename-site').value;
            if(n) { document.getElementById('brand-nav').innerText = n.toUpperCase(); document.getElementById('brand-main').innerText = n.toUpperCase(); }
        }

        // --- THE HTTPS FORCER ---
        function copySecureHTTPS() {
            let url = window.location.href;
            // Force replace local file or http with professional https structure
            let httpsUrl = url.replace("http:", "https:").replace("file:", "https:");
            
            // If it's a local file, we provide a clean web-ready version
            if(url.startsWith("file:")) {
                httpsUrl = "https://sanskrit2026.github.io/my-dracx-portal/"; 
            }

            const el = document.createElement('textarea');
            el.value = httpsUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("HTTPS Secure Link Generated & Copied!");
        }

        function forceHTTPS() {
            if (window.location.protocol !== 'https:' && !window.location.href.startsWith("file:")) {
                window.location.protocol = 'https:';
            } else {
                alert("Protocol Sync Complete. System is locked to Secure standards.");
            }
        }

        window.onload = () => {
            const s = localStorage.getItem('dx_sess');
            if(s) { loggedUser = s; initApp(); }
        }
    </script>
</body>
</html>
